<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Download File Info</title><link rel="stylesheet" href="style.css"></head>
<body>
  <div class="dlg-body">
    <div id="urlLine" style="color:var(--link);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:text;cursor:text;margin-bottom:12px"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <label style="width:74px">Category</label>
      <select id="category" style="width:180px">
        <option>General</option><option>Compressed</option><option>Documents</option>
        <option>Music</option><option>Programs</option><option>Video</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <label style="width:74px">Save As</label>
      <input type="text" id="saveAs" style="flex:1" spellcheck="false">
      <button class="btn" id="browse" style="min-width:30px;width:30px;padding:4px 0">…</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <label style="width:74px">Description</label>
      <input type="text" id="descr" style="flex:1" spellcheck="false">
    </div>
    <div style="margin:2px 0 0 82px;color:var(--muted)">File size: <span id="fsize">Unknown</span></div>
    <div class="btn-row">
      <button class="btn" id="later" style="min-width:110px">Download later</button>
      <button class="btn default" id="start" style="min-width:120px">Start Download</button>
      <button class="btn" id="cancel">Cancel</button>
    </div>
  </div>
  <script src="icons.js"></script>
  <script src="dialog.js"></script>
  <script>
    initTitlebar('Download File Info');
    const id = Number(Q.get('id'));
    const pathSep = navigator.platform.startsWith('Win') ? '\\' : '/';
    let d = null, userEdited = false;
    $('#saveAs').addEventListener('input', () => { userEdited = true; });

    function joinPath(dir, name) { return dir.replace(/[\\/]+$/, '') + pathSep + name; }
    function refresh(nd) {
      d = nd;
      $('#urlLine').textContent = d.url;
      $('#fsize').textContent = d.size != null ? fmtSize(d.size) : 'Unknown';
      if (!userEdited && d.filename) $('#saveAs').value = joinPath(d.dir, d.filename);
      if (d.category) $('#category').value = ['Compressed','Documents','Music','Programs','Video'].includes(d.category) ? d.category : 'General';
    }
    idm.onUpdate((nd) => { if (nd.id === id) refresh(nd); });
    idm.get(id).then((nd) => { if (nd) refresh(nd); });

    function splitSaveAs() {
      const v = $('#saveAs').value.trim();
      const i = Math.max(v.lastIndexOf('/'), v.lastIndexOf('\\'));
      return i > 0 ? { dir: v.slice(0, i), filename: v.slice(i + 1) } : { dir: null, filename: v || null };
    }
    $('#browse').onclick = async () => {
      const dir = await idm.chooseDir(splitSaveAs().dir || undefined);
      if (dir) { const f = splitSaveAs().filename || (d && d.filename) || ''; $('#saveAs').value = joinPath(dir, f); userEdited = true; }
    };
    $('#start').onclick = () => {
      const { dir, filename } = splitSaveAs();
      idm.confirm({ id, dir, filename, description: $('#descr').value, later: false });
      idm.winClose();
    };
    $('#later').onclick = () => {
      const { dir, filename } = splitSaveAs();
      idm.confirm({ id, dir, filename, description: $('#descr').value, later: true, queue: 'main' });
      idm.winClose();
    };
    $('#cancel').onclick = () => { idm.remove(id, false); idm.winClose(); };
  </script>
</body>
</html>
