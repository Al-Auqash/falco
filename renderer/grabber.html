<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Site Grabber</title><link rel="stylesheet" href="style.css"></head>
<body>
  <div class="dlg-body" style="padding:10px 12px">
    <div style="display:flex;align-items:center;gap:8px">
      <label style="flex:none">Start page/address:</label>
      <input type="text" id="url" style="flex:1" spellcheck="false" placeholder="https://example.com/page.html">
      <button class="btn default" id="go" style="min-width:80px">Start</button>
    </div>
    <div id="status" style="margin:8px 0 4px;color:#555">Enter a page URL and press Start to list its links.</div>
    <div style="border:1px solid #d9d9d9;background:#fff;flex:1;overflow:auto" id="links"></div>
    <div class="btn-row">
      <label style="margin-right:auto"><input type="checkbox" id="selAll" style="vertical-align:-2px"> Select all</label>
      <button class="btn" id="download" disabled>Download checked files</button>
      <button class="btn" id="close">Close</button>
    </div>
  </div>
  <script src="icons.js"></script>
  <script src="dialog.js"></script>
  <script>
    initTitlebar('Site Grabber');
    const linksBox = $('#links');
    function setStatus(t) { $('#status').textContent = t; }
    $('#go').onclick = async () => {
      let u = $('#url').value.trim();
      if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
      setStatus('Fetching page...');
      linksBox.innerHTML = '';
      let r = await idm.grab(u), hops = 0;
      while (r && r.redirect && hops++ < 5) r = await idm.grab(r.redirect);
      if (!r || r.error) { setStatus('Error: ' + (r ? r.error : 'unknown')); return; }
      const links = r.links || [];
      setStatus(links.length + ' links found');
      for (const link of links) {
        const row = document.createElement('label');
        row.style.cssText = 'display:flex;align-items:center;gap:6px;padding:2px 6px;white-space:nowrap';
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.value = link; cb.className = 'linkcb'; cb.style.verticalAlign = '-2px';
        const ic = document.createElement('span'); ic.innerHTML = fileIcon(link.split('?')[0]);
        const tx = document.createElement('span'); tx.textContent = link;
        row.append(cb, ic, tx);
        linksBox.appendChild(row);
      }
      $('#download').disabled = !links.length;
    };
    $('#selAll').onchange = (e) => document.querySelectorAll('.linkcb').forEach((c) => c.checked = e.target.checked);
    $('#download').onclick = async () => {
      const picked = [...document.querySelectorAll('.linkcb:checked')].map((c) => c.value);
      for (const u of picked) await idm.addStart(u);
      idm.winClose();
    };
    $('#close').onclick = () => idm.winClose();
    document.addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#go').click(); });
  </script>
</body>
</html>
