<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Download complete</title><link rel="stylesheet" href="style.css"></head>
<body>
  <div class="dlg-body" style="padding:14px 16px 12px">
    <div style="display:flex;align-items:flex-start;gap:12px">
      <span id="bigicon" style="flex:none"></span>
      <div style="min-width:0">
        <div id="fname" style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
        <div style="color:#2f9e44;margin-top:4px">Download complete</div>
        <div id="fpath" style="color:#555;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:text"></div>
        <div id="fsize" style="color:#555;margin-top:2px"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" id="open">Open</button>
      <button class="btn" id="folder">Open folder</button>
      <button class="btn default" id="close">Close</button>
    </div>
  </div>
  <script src="icons.js"></script>
  <script src="dialog.js"></script>
  <script>
    initTitlebar('Download complete');
    const id = Number(Q.get('id'));
    idm.get(id).then((d) => {
      if (!d) return;
      setDlgTitle(d.filename + ' - Download complete');
      const ic = document.createElement('span');
      ic.innerHTML = fileIcon(d.filename);
      ic.querySelector('svg').setAttribute('width', '34');
      ic.querySelector('svg').setAttribute('height', '34');
      $('#bigicon').appendChild(ic);
      $('#fname').textContent = d.filename;
      $('#fpath').textContent = d.savePath;
      $('#fsize').textContent = fmtSize(d.size);
    });
    $('#open').onclick = () => { idm.openFile(id); idm.winClose(); };
    $('#folder').onclick = () => { idm.openFolder(id); idm.winClose(); };
    $('#close').onclick = () => idm.winClose();
  </script>
</body>
</html>
